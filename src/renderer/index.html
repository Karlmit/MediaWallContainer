<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Wall</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main id="app">
      <section id="emptyState" class="empty-state hidden">
        <div class="brand">Media Wall</div>
        <p id="emptyMessage">No media found in the mounted folder.</p>
        <button id="chooseFolderButton" class="primary-button host-desktop">Choose folder</button>
      </section>

      <section id="wall" class="wall" aria-label="Media wall"></section>

      <div id="loadingState" class="loading-state hidden" role="status" aria-live="polite"></div>
      <div id="statusSplash" class="status-splash" role="status" aria-live="polite"></div>
      <div id="itemCountSplash" class="item-count-splash" role="status" aria-live="polite"></div>

      <div id="topBar" class="top-bar hidden">
        <button id="menuButton" class="icon-button" title="Open menu" aria-label="Open menu">Menu</button>
      </div>

      <aside id="debugPanel" class="debug-panel hidden" aria-label="Debug settings">
        <div id="panelTitle" class="panel-title">MediaWall</div>
        <button id="debugChooseFolderButton" class="panel-button host-desktop">Choose folder</button>
        <button id="pauseButton" class="panel-button">Pause random swaps</button>
        <button id="fullscreenButton" class="panel-button">Toggle fullscreen</button>
        <button id="refreshButton" class="panel-button host-web">Refresh media</button>
        <form id="logoutForm" class="host-web" method="post" action="/logout">
          <button class="panel-button" type="submit">Log out</button>
        </form>
        <label>
          <span>Items</span>
          <input id="itemCount" type="number" min="1" max="200" value="24">
        </label>
        <label>
          <span>Average size</span>
          <input id="averageSize" type="range" min="140" max="700" step="10" value="320">
        </label>
        <label>
          <span>New random media</span>
          <input id="swapSeconds" type="number" min="1" max="300" value="8">
        </label>
        <label>
          <span>Fade seconds</span>
          <input id="fadeSeconds" type="number" min="0" max="10" step="0.1" value="0.8">
        </label>
        <label class="checkbox-row">
          <input id="cropMedia" type="checkbox" checked>
          <span>Crop to fill tiles</span>
        </label>
        <label class="checkbox-row">
          <input id="videoDebug" type="checkbox">
          <span>Show video loading debug</span>
        </label>
        <section class="subfolder-section" aria-label="Subfolder filters">
          <div class="section-title">Subfolders</div>
          <div id="subfolderList" class="subfolder-list"></div>
        </section>
      </aside>

      <section id="diagnosticsPanel" class="diagnostics-panel hidden" aria-label="Transcode diagnostics">
        <header class="diagnostics-header">
          <div>
            <div class="panel-title">Transcodes and logs</div>
            <div id="diagnosticsMeta" class="diagnostics-meta">Status</div>
          </div>
          <button id="diagnosticsCloseButton" class="icon-button" title="Close diagnostics" aria-label="Close diagnostics">Close</button>
        </header>
        <div id="diagnosticsSummary" class="diagnostics-summary"></div>
        <section class="diagnostics-section">
          <div class="section-title">Active transcodes</div>
          <div id="activeTranscodeList" class="diagnostics-list"></div>
        </section>
        <section class="diagnostics-section">
          <div class="section-title">Queue</div>
          <div id="queuedTranscodeList" class="diagnostics-list"></div>
        </section>
        <section class="diagnostics-section">
          <div class="section-title">Recent results</div>
          <div id="recentTranscodeList" class="diagnostics-list"></div>
        </section>
        <section class="diagnostics-section">
          <div class="section-title">Recent logs</div>
          <div id="diagnosticsLogList" class="log-list"></div>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
